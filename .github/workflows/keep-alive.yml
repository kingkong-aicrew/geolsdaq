name: keep-alive (Render 슬립 방지)

# Render 무료는 15분 미사용 시 슬립 → 첫 요청 ~30초 cold start.
# /health 를 주기적으로 깨워 사용자 첫 요청 지연을 방지한다.
# (GitHub Actions cron 은 지연이 있을 수 있어 */5 로 여유. 완벽 보장은 외부 모니터/유료)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping /health
        run: curl -sS -m 30 https://geolsdaq-api.onrender.com/health || true
