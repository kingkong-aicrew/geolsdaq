name: fetch-us (EOD US prices)

on:
  schedule:
    # KST 06:00 = UTC 21:00 (전날) — 월~금 (한국 시간 기준)
    - cron: "0 21 * * 0-4"
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: geolsdaq
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: geolsdaq/backend/requirements.txt

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run fetch_us
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: python -m backend.batch.fetch_us --days 7
